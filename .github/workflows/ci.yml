name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Testes ────────────────────────────────────────────────────────────
  # Python 3.12 fixado para coincidir com 1_local_setup/.python-version (3.12.1)
  # O uv.lock foi gerado com esse interpretador; usar outra versão forçaria
  # o uv a baixar o Python correto de qualquer forma.
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv --no-cache-dir

      - name: Install dependencies (incluindo grupo dev)
        run: |
          cd 1_local_setup
          uv sync --all-groups

      - name: Lint — ruff check
        run: |
          cd 1_local_setup
          uv run ruff check ../ \
            --exclude .venv \
            --exclude uv.lock \
            --exclude "2_data_warehouse/recomendacao_projetos/target" \
            --exclude "2_data_warehouse/logs"

      - name: Lint — ruff format (check only)
        run: |
          cd 1_local_setup
          uv run ruff format ../ --check \
            --exclude .venv \
            --exclude uv.lock

      - name: Run tests
        run: |
          cd 1_local_setup
          uv run pytest ../tests/ -v --tb=short

  # ── Build da imagem Docker ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f 3_embeddings/Dockerfile \
            -t recomendacao-api:${{ github.sha }} \
            .

      - name: Smoke test — health endpoint
        run: |
          docker run --rm -d \
            --name api_smoke \
            -p 8001:8001 \
            recomendacao-api:${{ github.sha }}
          sleep 15
          curl -f http://localhost:8001/health || (docker logs api_smoke && exit 1)
          docker stop api_smoke
