name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint + Testes ────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv --no-cache-dir

      - name: Install dependencies (incluindo grupo dev)
        run: |
          cd 1_local_setup
          uv sync --all-groups

      - name: Lint — ruff check
        run: |
          cd 1_local_setup
          uv run ruff check ../ \
            --exclude .venv \
            --exclude uv.lock \
            --exclude "2_data_warehouse/recomendacao_projetos/target" \
            --exclude "2_data_warehouse/logs"

      - name: Lint — ruff format (check only)
        run: |
          cd 1_local_setup
          uv run ruff format ../ --check \
            --exclude .venv \
            --exclude uv.lock

      - name: Run tests
        run: |
          cd 1_local_setup
          uv run pytest ../tests/ -v --tb=short

  # ── Build da imagem Docker ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f 3_embeddings/Dockerfile \
            -t recomendacao-api:${{ github.sha }} \
            .

      - name: Smoke test — health endpoint
        run: |
          docker run --rm -d \
            --name api_smoke \
            -p 8001:8001 \
            recomendacao-api:${{ github.sha }}
          sleep 15
          curl -f http://localhost:8001/health || (docker logs api_smoke && exit 1)
          docker stop api_smoke
